name: Publish to npm

on:
  release:
    types: [published]

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      
      - name: Check versions
        run: |
          node -v
          npm -v
          npm -v | node -e "const v=require('fs').readFileSync(0,'utf8').trim().split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && v[1] < 5) || (v[0] === 11 && v[1] === 5 && v[2] < 1)) { console.error('npm 11.5.1+ is required for npm Trusted Publishing'); process.exit(1); }"

      - name: Install dependencies
        run: npm ci

      - name: Set package version from tag
        run: |
          VERSION="${RELEASE_TAG#v}"
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            echo "package.json already has version $VERSION"
          else
            npm version "$VERSION" --no-git-tag-version
          fi

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

      - name: Check package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public

      - name: Print npm debug logs
        if: failure()
        run: |
          echo "Looking for npm debug logs..."
          if ls ~/.npm/_logs/*-debug-0.log >/dev/null 2>&1; then
            for log in ~/.npm/_logs/*-debug-0.log; do
              echo ""
              echo "===== $log ====="
              cat "$log"
            done
          else
            echo "No npm debug logs found."
          fi